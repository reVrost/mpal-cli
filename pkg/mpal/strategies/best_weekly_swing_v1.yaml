id: best_weekly_swing_v1
version: 1.0.0
defaults: swing_v1
name: Best weekly swing v1
description: Default weekly swing-trading review strategy for current MarketPal capabilities. Momentum leads the entry signal, profile/QVM checks holdability, and server raw Kelly evidence sizes qualified trades through the fractional-Kelly overlay.
when_to_use: Use for the standard weekly swing review when the goal is to add or top up high-ranked candidates without running a broader rebuild. Prefer this over experimental quality/value configs until the hosted API supports scoring v2.
cadence: weekly
approved: true

scoring:
  momentum_weight: 0.70
  profile_weight: 0.30
  min_buy_score: 0.68
  min_hold_score: 0.22

portfolio:
  max_positions: 20
  max_position_pct: 0.16
  min_trade_value: 2500
  rebalance: weekly

risk:
  profile: weekly_swing
  sizing_method: fractional_kelly
  turnover_budget_pct: 0.12
  max_single_trade_pct: 0.035
  starter_position_pct: 0.015
  kelly_fraction: 0.20
  kelly_max_fraction: 0.04
  max_new_positions_per_run: 3
  cash_buffer_pct: 0.02
