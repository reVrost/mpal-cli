id: portfolio_quality_value_reversion_v1
version: 1.0.0
defaults: swing_v1
name: Portfolio quality-value reversion v1
description: Low-churn full-portfolio mean-reversion review. It favors high-quality, underpriced candidates with a measured pullback and keeps new position sizing conservative.
when_to_use: Use for full-portfolio or well-funded portfolio reviews when the mandate is to deploy cash into quality names that screen cheap after a pullback. Prefer the engine-specific version for policy engine-sleeve reviews.
cadence: weekly_or_monthly_manual
approved: true

scoring:
  momentum_weight: 0.15
  profile_weight: 0.00
  quality_weight: 0.35
  value_weight: 0.35
  reversion_weight: 0.15
  min_buy_score: 0.62
  min_hold_score: 0.30

portfolio:
  max_positions: 25
  max_position_pct: 0.10
  min_trade_value: 5000
  rebalance: weekly

risk:
  turnover_budget_pct: 0.08
  max_single_trade_pct: 0.025
  starter_position_pct: 0.012
  max_new_positions_per_run: 2
  cash_buffer_pct: 0.03
