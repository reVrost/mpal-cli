id: engine_quality_swing_rebuild_v1
version: 1.0.0
defaults: swing_v1
name: Engine quality-swing rebuild v1
description: Higher-turnover quality-swing strategy for rebuilding the Marketpal return-engine sleeve. It exits weak holds, trims oversized positions, and adds high-ranked swing candidates.
when_to_use: Use manually for monthly or quarterly engine cleanup, transition rebalances, or when the active sleeve needs a deliberate rebuild. Do not use as the default daily review because it can use up to 30% turnover.
cadence: monthly_or_quarterly_manual
approved: true

scoring:
  momentum_weight: 0.75
  profile_weight: 0.25
  min_buy_score: 0.62
  min_hold_score: 0.35

portfolio:
  max_positions: 20
  max_position_pct: 0.10
  min_trade_value: 100
  rebalance: weekly

risk:
  profile: rebuild
  sizing_method: fractional_kelly
  max_new_positions_per_run: 7
  cash_buffer_pct: 0.03
