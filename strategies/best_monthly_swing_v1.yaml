id: best_monthly_swing_v1
version: 1.0.0
defaults: swing_v1
name: Best monthly swing v1
description: Default monthly swing-trading review strategy for current Marketpal capabilities. It uses a true monthly rebalance horizon, gives profile/QVM more weight than the weekly strategy, and keeps Kelly sizing more conservative.
when_to_use: Use for monthly swing reviews when the goal is a slower, higher-quality allocation pass rather than weekly timing or an engine rebuild. It should make fewer changes and require stronger persistence before adding new positions.
cadence: monthly
approved: true

scoring:
  momentum_weight: 0.60
  profile_weight: 0.40
  min_buy_score: 0.72
  min_hold_score: 0.28

portfolio:
  max_positions: 18
  max_position_pct: 0.14
  min_trade_value: 5000
  rebalance: monthly

risk:
  profile: low_churn
  sizing_method: fractional_kelly
  turnover_budget_pct: 0.05
  max_single_trade_pct: 0.025
  starter_position_pct: 0.012
  kelly_fraction: 0.15
  kelly_max_fraction: 0.03
  max_new_positions_per_run: 2
  cash_buffer_pct: 0.03
