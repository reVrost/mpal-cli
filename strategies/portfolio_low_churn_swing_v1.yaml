id: portfolio_low_churn_swing_v1
version: 1.0.0
name: Portfolio low-churn swing review v1
description: Conservative swing-trading review for a full or well-funded portfolio. Keeps turnover low, uses starter sizing, and may return NO_TRADE when cash or minimum-trade constraints make a trade impractical.
when_to_use: Use for routine daily or weekly reviews when the goal is controlled incremental changes, not a major engine rebuild. Best for full-portfolio checks or larger sleeves where 1.2% starter trades clear the minimum trade value.
cadence: daily_or_weekly
approved: true

scoring:
  momentum_weight: 0.75
  profile_weight: 0.25
  min_buy_score: 0.70
  min_hold_score: 0.14

event_guardrail:
  enabled: true
  lookback_days: 14
  event_veto_score: -0.55
  event_boost_score: 0.70
  event_boost_amount: 0.03

portfolio:
  long_only: true
  max_positions: 20
  max_position_pct: 0.20
  min_trade_value: 5000
  rebalance: daily

risk:
  turnover_budget_pct: 0.06
  max_single_trade_pct: 0.025
  starter_position_pct: 0.012
  max_new_positions_per_run: 4
  cash_buffer_pct: 0.01
  protect_unscored_holdings: true

backtest:
  initial_cash: 100000
  fee_bps: 5
  slippage_bps: 10
