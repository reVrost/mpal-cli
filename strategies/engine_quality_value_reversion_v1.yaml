id: engine_quality_value_reversion_v1
version: 1.0.0
defaults: swing_v1
name: Engine quality-value reversion v1
description: Conservative mean-reversion strategy for the MarketPal return-engine sleeve. It looks for high-quality, attractively valued names that have pulled back enough to offer a reversion setup without relying on broken momentum.
when_to_use: Use manually for engine-sleeve cash deployment when the investor wants quality and valuation to dominate momentum. Best for starter buys or modest top-ups after a pullback; not for high-churn cleanup.
cadence: weekly_or_monthly_manual
approved: true

scoring:
  momentum_weight: 0.15
  profile_weight: 0.00
  quality_weight: 0.35
  value_weight: 0.35
  reversion_weight: 0.15
  min_buy_score: 0.62
  min_hold_score: 0.30

portfolio:
  max_positions: 20
  max_position_pct: 0.12
  min_trade_value: 2500
  rebalance: weekly

risk:
  turnover_budget_pct: 0.10
  max_single_trade_pct: 0.03
  starter_position_pct: 0.015
  max_new_positions_per_run: 2
  cash_buffer_pct: 0.02
